line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF", "S"]
ignore = ["E501"]   # long lines may occur in test fixtures

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106"]   # assert + dummy passwords are intentional in tests

[format]
quote-style = "double"
