name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests
      - name: Type-check
        run: python -m mypy
      - name: Test
        run: python -m pytest --cov=mneva --cov-report=term-missing --cov-fail-under=80
      - name: Build wheel
        run: python -m build
      - name: Install wheel
        shell: bash
        run: pip install --force-reinstall --no-deps dist/*.whl
      - name: Smoke (mneva --version)
        shell: bash
        run: mneva --version
