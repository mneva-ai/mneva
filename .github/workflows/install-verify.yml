name: Install Verify

on:
  release:
    types: [published]

env:
  MNEVA_VERSION: ${{ github.event.release.tag_name }}

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pipx
        run: python -m pip install --upgrade pip pipx
      - name: Install mneva
        shell: bash
        run: python -m pipx install "mneva==${MNEVA_VERSION#v}"
      - name: Smoke
        shell: bash
        run: pipx run mneva --version
